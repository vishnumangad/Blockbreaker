<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball and Blocks Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            margin-left:0px;
            background: #222;
            display: block;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .scoreboard {
            color: white;
            font-size: 20px;
            margin: 10px;
        }
        button {
            padding: 15px;
            font-size: 24px;
            cursor: pointer;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
        }
        button:active {
            background: darkblue;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color:white;
            text-shadow:2px 2px 4px red;
            font-size: 50px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="scoreboard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button id="leftBtn">⬅️</button>
        <button id="rightBtn">➡️</button>
    </div>
    <div class="game-over" id="gameOverText">Game Over!</div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const gameOverText = document.getElementById("gameOverText");

        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.8;

        let score = 0;

        function updateScore() {
            scoreDisplay.textContent = score;
        }

        const paddle = {
            
            width: 100,
            height: 15,
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            speed: 7,
            dx: 0
        };

        const ball = {
             
            x: canvas.width / 3,
            y: canvas.height / 3,
            radius: 6,
            dx: 2,
            dy: -2
        };

        const blockRowCount = 20;
        const blockColumnCount = Math.floor(canvas.width / 10);
        const blockWidth = 15;
        const blockHeight = 10;
        const blockPadding = 4;
        const blockColors = ["red", "blue", "green", "yellow", "purple", "orange","indigo","#0f0"];
        let blocks = [];

        function generateBlocks() {
            blocks = [];
            for (let r = 0; r < blockRowCount; r++) {
                blocks[r] = [];
                for (let c = 0; c < blockColumnCount; c++) {
                    blocks[r][c] = {
                        x: c * (blockWidth + blockPadding) + 15,
                        y: r * (blockHeight + blockPadding) + 30,
                        status: 1,
                        color: blockColors[Math.floor(Math.random() * blockColors.length)]
                    };
                }
            }
        }
        generateBlocks();

        let particles = [];

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x + Math.random() * blockWidth,
                    y: y + Math.random() * blockHeight,
                    dx: (Math.random() - 0.5) * 4,
                    dy: (Math.random() - 0.5) * 4,
                    size: Math.random() * 4 + 2,
                    color: color,
                    life: 30
                });
            }
        }

        function drawParticles() {
            particles.forEach((particle, index) => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
                ctx.globalAlpha = 1;
                particle.x += particle.dx;
                particle.y += particle.dy;
                particle.life--;
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function drawPaddle() {
            ctx.fillStyle = "blue";
            
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        }

        function drawBlocks() {
            blocks.forEach(row => {
                row.forEach(block => {
                    if (block.status === 1) {
                        ctx.fillStyle = block.color;
                        ctx.fillRect(block.x, block.y, blockWidth, blockHeight);
                    }
                });
            });
        }

         function movePaddle() {
            if (leftPressed) paddle.x -= paddle.speed;
            if (rightPressed) paddle.x += paddle.speed;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx *= -1;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            if (
                ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width
            ) {
                ball.dy *= -1;
            }

            blocks.forEach(row => {
                row.forEach(block => {
                    if (block.status === 1) {
                        if (
                            ball.x > block.x &&
                            ball.x < block.x + blockWidth &&
                            ball.y - ball.radius < block.y + blockHeight &&
                            ball.y + ball.radius > block.y
                        ) {
                            ball.dy *= -1;
                            block.status = 0;
                            score += 10;
                            updateScore();
                            createParticles(block.x, block.y, block.color);
                        }
                    }
                });
            });

            if (ball.y + ball.radius > canvas.height) {
                showGameOver();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPaddle();
            drawBall();
            drawBlocks();
            drawParticles();
        }

        function update() {
            movePaddle();
            moveBall();
            draw();
            requestAnimationFrame(update);
        }

        function showGameOver() {
            gameOverText.style.opacity = 1;
            setTimeout(() => {
                gameOverText.style.opacity = 0;
                resetGame();
            }, 1500);
        }

        function resetGame() {
            score = 0;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 3;
            ball.dy = -3;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            generateBlocks();
            updateScore();
        }

            let leftPressed = false;
        let rightPressed = false;

        document.getElementById("leftBtn").addEventListener("mousedown", () => leftPressed = true);
        document.getElementById("rightBtn").addEventListener("mousedown", () => rightPressed = true);
        document.addEventListener("mouseup", () => { leftPressed = false; rightPressed = false; });

        document.getElementById("leftBtn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            leftPressed = true;
        });
        document.getElementById("rightBtn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            rightPressed = true;
        });
        document.addEventListener("touchend", () => {
            leftPressed = false;
            rightPressed = false;
        });

        update();
    </script>
</body>
</html>
